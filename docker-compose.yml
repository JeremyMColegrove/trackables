services:
  trackable:
    image: jeremycolegrove/trackable:arm64
    container_name: trackable
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_WEBHOOK_SIGNING_SECRET: ${CLERK_WEBHOOK_SIGNING_SECRET}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - 3000:3000
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: trackable-postgres
    environment:
      POSTGRES_DB: "trackable"
      POSTGRES_USER: "superman"
      POSTGRES_PASSWORD: "peanutbutter"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superman -d trackable"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  cloudflared:
      image: cloudflare/cloudflared:latest
      container_name: cloudflared
      command: tunnel --no-autoupdate run --token
            eyJhIjoiMTI3YzM5Yzk5NTc0ZDIyODVhOGNhYTQ4N2M0ZmU2MWMiLCJ0IjoiYTM4MGVlNGYtOWVjZi00Yjg5LTgyYWItYzdjYjg1NDcxOGQ5IiwicyI6Ik5HRmtNV1JpWXpjdFpqRTJOaTAwTXpjM0xXRmxPVGt0TXpSaE5tTmpNV0UyTVRGbSJ9
      restart: unless-stopped

